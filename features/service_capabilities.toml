# Feature-owned agentic capability manifests.
# The orchestrator consumes this file as runtime metadata only.

[[service_capabilities]]
service_name = "research"
capability_id = "feature.research"
kind = "feature"
owner = "features/research"
owner_family = "rag_context"
lifecycle_status = "active"
consolidation_target = "features/knowledge_runtime"
capabilities = ["rag", "cag", "search", "notes"]
transport = { type = "dispatch", service = "research", method = "POST", path = "/v1/research/search" }
policy_action = "rag.query"
risk_level = "low"
supported_action_types = ["rag_query", "api_call"]
resource_profile = { resource_class = "rag", lane = "interactive" }
input_schema = { type = "object", contract = "SearchRequest", schema_ref = "python:research.types:SearchRequest", required = ["query"] }
output_schema = { type = "object", contract = "SearchResponse", schema_ref = "python:research.types:SearchResponse", fields = ["content", "results", "total_tokens", "status", "source_statuses", "degraded", "evidence_bundle", "limits", "query_plan", "reasoning_context", "retrieval_traces", "miss_review", "metadata"] }
evidence_types = ["rag_context", "citation", "semantic_memory"]
writes_allowed = false
idempotency_policy = "read_only"
dry_run_supported = false
rollback_supported = false
events_published = ["rag.query.completed", "rag.miss", "service.degraded"]
risk_review_criteria = ["read_only_retrieval", "no_index_mutation", "citations_required"]
round_dependencies = []
timeout_seconds = 10

[[service_capabilities]]
service_name = "workspace_execution"
capability_id = "feature.workspace_execution"
kind = "feature"
owner = "features/workspace_execution"
owner_family = "sandbox_runtime"
lifecycle_status = "active_runtime_owner"
consolidation_target = "features/workspace_runtime"
capabilities = ["workspace_execution", "disposable_sessions", "batch_file_write_contracts", "patch_apply_contracts", "sandbox_command_contracts", "structured_diffs", "transient_artifacts", "storage_guardian_publish_contract"]
transport = { type = "dispatch", service = "workspace_execution", method = "POST", path = "/v1/workspace-execution/sessions" }
policy_action = "workspace.sandbox.create"
risk_level = "medium"
supported_action_types = ["api_call", "sandbox_session"]
resource_profile = { resource_class = "cpu_io", lane = "background" }
input_schema = { type = "object", contract = "SessionCreateRequest", schema_ref = "python:workspace_execution.types:SessionCreateRequest", required = ["source"] }
output_schema = { type = "object", contract = "SessionResponse", schema_ref = "python:workspace_execution.types:SessionResponse", fields = ["session_id", "status", "state_hash", "expires_at"] }
evidence_types = ["session_record", "state_hash", "redacted_log", "diff", "artifact_descriptor"]
writes_allowed = true
idempotency_policy = "idempotent_by_session_source_and_profile"
dry_run_supported = true
rollback_supported = false
events_published = ["workspace.session.created", "workspace.input.attached", "workspace.files.batch_written", "workspace.files.batch_blocked", "workspace.patch.applied", "workspace.patch.blocked", "workspace.session.closed", "workspace.command.started", "workspace.command.completed", "workspace.diff.generated", "workspace.artifact.discovered", "workspace.artifact.published", "workspace.cleanup.completed", "workspace.cleanup.failed", "service.degraded"]
risk_review_criteria = ["disposable_copy_only", "no_real_host_write", "storage_publish_via_storage_guardian", "hash_verified_batch_writes", "patch_apply_uses_workspace_hashes", "execution_policy_required_for_shell", "destructive_profile_requires_approval"]
round_dependencies = ["execution_policy_operator"]
timeout_seconds = 30

[[service_capabilities]]
service_name = "material_execution_kernel"
capability_id = "feature.material_execution_kernel"
kind = "feature"
owner = "features/material_execution_kernel"
owner_family = "material_runtime"
lifecycle_status = "active"
capabilities = ["material_sessions", "incremental_manifest", "event_stream", "repair_loop", "patch_first", "requires_vm_backed_sandbox"]
transport = { type = "dispatch", service = "material_execution_kernel", method = "POST", path = "/v1/material-execution/sessions" }
policy_action = "material.execution.start"
risk_level = "medium"
supported_action_types = ["api_call", "material_session"]
resource_profile = { resource_class = "cpu_io", lane = "background" }
input_schema = { type = "object", contract = "MaterialSessionRequest", schema_ref = "python:material_execution_kernel.types:MaterialSessionRequest", required = ["task_id", "trace_id", "idempotency_key", "goal", "language_context"] }
output_schema = { type = "object", contract = "MaterialSessionResponse", schema_ref = "python:material_execution_kernel.types:MaterialSessionResponse", fields = ["session_id", "task_id", "status", "manifest_ref", "sandbox", "validation_summary", "diagnostics_ref"] }
evidence_types = ["material_session", "material_manifest", "material_event", "completion_evidence", "diagnostics_ref"]
writes_allowed = false
idempotency_policy = "idempotent_by_task_material_key"
dry_run_supported = true
rollback_supported = false
events_published = ["material.session.created", "material.policy.preflight.passed", "material.vm.ready", "material.plan.created", "material.files.generated", "material.workspace.write.completed", "material.validation.passed", "material.package.created", "material.completed", "material.failed_closed", "service.degraded"]
risk_review_criteria = ["kernel_does_not_execute_shell", "kernel_does_not_write_files", "sandbox_owner_required_for_writes", "vm_backed_required_for_generated_code", "storage_publish_via_storage_guardian"]
round_dependencies = ["workspace_execution", "material_builder"]
timeout_seconds = 60

[[service_capabilities]]
service_name = "personal_context"
capability_id = "feature.personal_context"
kind = "feature"
owner = "features/personal_context"
owner_family = "personal_context"
lifecycle_status = "active"
capabilities = ["calendar", "email", "rss", "personal"]
transport = { type = "dispatch", service = "personal_context", method = "GET", path = "/v1/personal/calendar" }
policy_action = "personal_context.read"
risk_level = "medium"
supported_action_types = ["api_call"]
resource_profile = { resource_class = "cpu", lane = "interactive" }
input_schema = { type = "object", contract = "FeatureQueryRequest", schema_ref = "python:orchestrator.dispatch.types:FeatureQueryRequest", required = ["query"] }
output_schema = { type = "object", contract = "CalendarResponse", schema_ref = "python:personal_context.types:CalendarResponse", fields = ["events", "window_days"] }
evidence_types = ["personal_context", "preference_memory"]
