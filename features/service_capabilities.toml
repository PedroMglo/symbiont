[[service_capabilities]]
service_name = "extrator"
capability_id = "feature.extrator"
kind = "feature"
owner = "features/extrator"
owner_family = "document_pipeline"
lifecycle_status = "active"
consolidation_target = "features/document_runtime"
capabilities = ["document_etl", "document_extraction", "file_conversion", "rag_bundle", "workspace_sandbox_preparation_plan"]
