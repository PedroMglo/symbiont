# AI Symbiont - Security Configuration

[security]
allowed_commands = [
    "free", "nvidia-smi", "df", "ps", "uptime", "nproc",
    "uname", "ip", "sensors", "git", "ollama", "docker",
    "cat", "wc", "head", "tail", "lsblk",
]
injection_scanning = false
agent_sandboxing = false
secrets_scanning = false
