# =============================================================================
# Agentic supervised overlay
# =============================================================================
# Use with the canonical compose fragments, not through the root include wrapper:
#
#   docker compose -p ai-local \
#     --env-file .env.storage.generated \
#     --env-file .env.llm.generated \
#     --env-file .env.services.generated \
#     -f infra/docker/compose/storage-guardian.yml \
#     -f infra/docker/compose/rag.yml \
#     -f infra/docker/compose/symbiont.yml \
#     -f infra/docker/compose/agentic-supervised.yml \
#     --profile core --profile storage up -d --build
#
# Defaults in config/orc/agents.toml remain safe. This overlay is the explicit
# supervised runner profile: runner on, policy enforce and command tool
# read-only; proposals/event loop/actuator/governed improvements still disabled
# unless a later phase is enabled deliberately through env overrides.
# =============================================================================

services:
  symbiont:
    environment:
      ORC_AGENTIC_RUNTIME_RUNNER_ENABLED: ${ORC_AGENTIC_RUNTIME_RUNNER_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_AUTONOMOUS_SAFE_ENABLED: ${ORC_AGENTIC_RUNTIME_AUTONOMOUS_SAFE_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_EVENT_LOOP_ENABLED: ${ORC_AGENTIC_RUNTIME_EVENT_LOOP_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_POLICY_MODE: ${ORC_AGENTIC_RUNTIME_POLICY_MODE:-enforce}
      ORC_AGENTIC_RUNTIME_EVENT_LOOP_POLL_INTERVAL_SECONDS: ${ORC_AGENTIC_RUNTIME_EVENT_LOOP_POLL_INTERVAL_SECONDS:-2}
      ORC_AGENTIC_RUNTIME_RUNTIME_FLAG_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_RUNTIME_FLAG_TTL_SECONDS:-60}
      ORC_AGENTIC_RUNTIME_RAG_MISS_THRESHOLD: ${ORC_AGENTIC_RUNTIME_RAG_MISS_THRESHOLD:-3}
      ORC_AGENTIC_RUNTIME_AGENT_FAILURE_THRESHOLD: ${ORC_AGENTIC_RUNTIME_AGENT_FAILURE_THRESHOLD:-3}
      ORC_AGENTIC_RUNTIME_AGENT_FAILURE_WINDOW_SECONDS: ${ORC_AGENTIC_RUNTIME_AGENT_FAILURE_WINDOW_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS:-1200}
      ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS:-600}
      ORC_AGENTIC_RUNTIME_RUNNER_EXECUTE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_RUNNER_EXECUTE_PROPOSALS:-false}
      ORC_AGENTIC_RUNTIME_EVENT_LOOP_VLLM_UNHEALTHY_ENABLED: ${ORC_AGENTIC_RUNTIME_EVENT_LOOP_VLLM_UNHEALTHY_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_AUTONOMOUS_MAINTENANCE_ENABLED: ${ORC_AGENTIC_RUNTIME_AUTONOMOUS_MAINTENANCE_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_GOVERNED_IMPROVEMENT_ENABLED: ${ORC_AGENTIC_RUNTIME_GOVERNED_IMPROVEMENT_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_POLL_INTERVAL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_POLL_INTERVAL_SECONDS:-2}
      ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_APPLY_RUNTIME_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_APPLY_RUNTIME_FLAGS:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_MAX_AUTO_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_MAX_AUTO_TTL_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_ACTUATOR_MIN_CONFIDENCE: ${ORC_AGENTIC_RUNTIME_ACTUATOR_MIN_CONFIDENCE:-0.75}
      ORC_AGENTIC_RUNTIME_ACTUATOR_MIN_SCORE: ${ORC_AGENTIC_RUNTIME_ACTUATOR_MIN_SCORE:-3}
      ORC_AGENTIC_RUNTIME_ACTUATOR_IMPACT_INTERVAL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_IMPACT_INTERVAL_SECONDS:-10}
      ORC_AGENTIC_RUNTIME_ACTUATOR_BYPASS_FAILURE_THRESHOLD: ${ORC_AGENTIC_RUNTIME_ACTUATOR_BYPASS_FAILURE_THRESHOLD:-1}
      ORC_AGENTIC_RUNTIME_ACTUATOR_CLOSED_LOOP_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_CLOSED_LOOP_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_RENEW_ENFORCED_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_RENEW_ENFORCED_FLAGS:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_RENEWAL_WINDOW_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_RENEWAL_WINDOW_SECONDS:-60}
      ORC_AGENTIC_RUNTIME_ACTUATOR_MAX_RENEWALS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_MAX_RENEWALS:-1}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ATTENTION_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ATTENTION_TTL_SECONDS:-300}
      ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_ROLLBACK_MISSING_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_ROLLBACK_MISSING_FLAGS:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_LADDER_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_LADDER_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_WINDOW_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_WINDOW_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_L2_THRESHOLD: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_L2_THRESHOLD:-2}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_L3_THRESHOLD: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_L3_THRESHOLD:-3}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_FLAG_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_FLAG_TTL_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_CREATE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_CREATE_PROPOSALS:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_ENABLED:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_CREATE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_CREATE_PROPOSALS:-false}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_ROUTE_FLAG_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_ROUTE_FLAG_TTL_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ENABLED: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND:-workspace_execution}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DEFAULT_CONTEXT_PROFILE: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DEFAULT_CONTEXT_PROFILE:-project_context}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SANDBOX_IMAGE: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SANDBOX_IMAGE:-ai-local-command-sandbox:latest}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS:-120}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES:-64000}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SESSION_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SESSION_TTL_SECONDS:-2160}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_COMMANDS_PER_SESSION: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_COMMANDS_PER_SESSION:-40}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_MEMORY_LIMIT_MB: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_MEMORY_LIMIT_MB:-512}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_PIDS_LIMIT: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_PIDS_LIMIT:-192}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_USER_CONTEXT_RO: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_USER_CONTEXT_RO:-false}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_HOST_CONTEXT_RO: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_HOST_CONTEXT_RO:-false}
      AI_LOCAL_PROJECT_ROOT: ${AI_LOCAL_PROJECT_ROOT:-/project}
      AI_LOCAL_HOST_PROJECT_ROOT: ${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}
      AI_LOCAL_OUTPUT_ROOT: ${AI_LOCAL_OUTPUT_ROOT:-/tmp/agentic-command-output}
      AI_LOCAL_HOST_OUTPUT_ROOT: ${AI_LOCAL_HOST_OUTPUT_ROOT:-${PWD}/.tmp/agentic-command-output}
      ORC_AGENTIC_RUNTIME_MAINTENANCE_REPORT_INTERVAL_SECONDS: ${ORC_AGENTIC_RUNTIME_MAINTENANCE_REPORT_INTERVAL_SECONDS:-900}
      ORC_AGENTIC_RUNTIME_IMPROVEMENT_REVIEW_INTERVAL_SECONDS: ${ORC_AGENTIC_RUNTIME_IMPROVEMENT_REVIEW_INTERVAL_SECONDS:-900}
      AI_STORAGE_EXTERNAL_ROOT: ${AI_STORAGE_EXTERNAL_ROOT:-}
      AI_STORAGE_REQUIRE_EXTERNAL: ${AI_STORAGE_REQUIRE_EXTERNAL:-false}
