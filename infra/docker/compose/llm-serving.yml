# AI Symbiont — LLM Serving Backends
# Services: llama-cpp (CPU auxiliary), vllm (GPU primary)
#
# Usage:
#   docker compose -f compose.yml --env-file .env.storage.generated --profile llm up -d
#   docker compose -f compose.yml --env-file .env.storage.generated --profile llm --profile gpu up -d
#
# Architecture:
#   llama-cpp-aux  → CPU models (Qwen3:4b Q4_K_M) — port 8090
#   llama-cpp-fast → CPU fast classifier (Qwen3:1.7b Q8_0) — port 8091
#   vllm           → GPU primary model (Qwen3:8b AWQ) — port 8092
#
# The symbiont LLMRouter connects to these via OpenAI-compatible /v1 API.
# Ollama remains as fallback if these containers are not running.
#
# Storage:
#   LLM_MODELS_DIR and HF_CACHE_DIR come from .env.storage.generated
#   (local or external SSD, resolved by config/resolver.py).
# Runtime/model policy:
#   URLs, model assignments, context windows and hardware knobs come from
#   .env.llm.generated, generated by config/resolver.py.

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
x-common-labels: &common-labels
  ai.local.managed: "true"
  ai.local.stack: llm-serving
services:
  # ---------------------------------------------------------------------------
  # llama-cpp-aux: Auxiliary CPU model server (Qwen3:4b Q4_K_M)
  # Serves: reasoning_and_response auxiliary modes, audio_streaming LLM post, RAG reranker
  # ---------------------------------------------------------------------------
  llama-cpp-aux:
    image: ghcr.io/ggml-org/llama.cpp:${LLAMA_CPP_IMAGE_TAG:-server}
    container_name: orc-llama-cpp-aux
    restart: unless-stopped
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: llama-cpp-aux
      ai.local.service_class: llm-local
      ai.local.exposure_class: llm-local
      ai.local.profile: llm
      ai.local.owner: llm
      ai.local.component: llm-backend
      ai.local.role: auxiliary-4b
    expose:
      - "8080"
    ports:
      - "${AI_LOCAL_BIND:-127.0.0.1}:${LLAMA_CPP_AUX_PORT:-8090}:8080"
    environment:
      LLAMA_ARG_MODEL: ${LLAMA_CPP_AUX_MODEL_FILE:-/models/Qwen3-4B-Q4_K_M.gguf}
      LLAMA_ARG_CTX_SIZE: "${LLAMA_CPP_AUX_CTX_SIZE:-4096}"
      LLAMA_ARG_N_PREDICT: "${LLAMA_CPP_AUX_N_PREDICT:-512}"
      LLAMA_ARG_THREADS: "${LLAMA_CPP_AUX_THREADS:-6}"
      LLAMA_ARG_N_GPU_LAYERS: "0"
      LLAMA_ARG_BATCH_SIZE: "${LLAMA_CPP_AUX_BATCH_SIZE:-512}"
      LLAMA_ARG_FLASH_ATTN: "false"
      LLAMA_ARG_CONT_BATCHING: "true"
      LLAMA_ARG_PARALLEL: "${LLAMA_CPP_AUX_PARALLEL:-2}"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
    volumes:
      - type: bind
        source: ${LLM_MODELS_DIR:-.local/data/models/gguf}
        target: /models
        read_only: true
    networks:
      - ai-local
    deploy:
      resources:
        limits:
          memory: ${LLAMA_CPP_AUX_MEM_LIMIT:-6g}
          cpus: "${LLAMA_CPP_AUX_CPUS_LIMIT:-6.0}"
          pids: ${LLAMA_CPP_AUX_PIDS_LIMIT:-512}
        reservations:
          memory: ${LLAMA_CPP_AUX_MEM_RESERVATION:-3g}
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    profiles:
      - llm
  # ---------------------------------------------------------------------------
  # llama-cpp-fast: Fast CPU classifier (Qwen3:1.7b Q8_0)
  # Serves: reasoning_and_response classification, RAG router, prewarming L2
  # ---------------------------------------------------------------------------
  llama-cpp-fast:
    image: ghcr.io/ggml-org/llama.cpp:${LLAMA_CPP_IMAGE_TAG:-server}
    container_name: orc-llama-cpp-fast
    restart: unless-stopped
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: llama-cpp-fast
      ai.local.service_class: llm-local
      ai.local.exposure_class: llm-local
      ai.local.profile: llm
      ai.local.owner: llm
      ai.local.component: llm-backend
      ai.local.role: classifier-1.7b
    expose:
      - "8080"
    ports:
      - "${AI_LOCAL_BIND:-127.0.0.1}:${LLAMA_CPP_FAST_PORT:-8091}:8080"
    environment:
      LLAMA_ARG_MODEL: ${LLAMA_CPP_FAST_MODEL_FILE:-/models/Qwen3-1.7B-Q8_0.gguf}
      LLAMA_ARG_CTX_SIZE: "${LLAMA_CPP_FAST_CTX_SIZE:-2048}"
      LLAMA_ARG_N_PREDICT: "${LLAMA_CPP_FAST_N_PREDICT:-256}"
      LLAMA_ARG_THREADS: "${LLAMA_CPP_FAST_THREADS:-4}"
      LLAMA_ARG_N_GPU_LAYERS: "0"
      LLAMA_ARG_BATCH_SIZE: "${LLAMA_CPP_FAST_BATCH_SIZE:-256}"
      LLAMA_ARG_FLASH_ATTN: "false"
      LLAMA_ARG_CONT_BATCHING: "true"
      LLAMA_ARG_PARALLEL: "${LLAMA_CPP_FAST_PARALLEL:-3}"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
    volumes:
      - type: bind
        source: ${LLM_MODELS_DIR:-.local/data/models/gguf}
        target: /models
        read_only: true
    networks:
      - ai-local
    deploy:
      resources:
        limits:
          memory: ${LLAMA_CPP_FAST_MEM_LIMIT:-3g}
          cpus: "${LLAMA_CPP_FAST_CPUS_LIMIT:-4.0}"
          pids: ${LLAMA_CPP_FAST_PIDS_LIMIT:-512}
        reservations:
          memory: ${LLAMA_CPP_FAST_MEM_RESERVATION:-1g}
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    profiles:
      - llm
  # ---------------------------------------------------------------------------
  # vLLM: GPU primary model server (Qwen3:8b AWQ)
  # Serves: reasoning_and_response, symbiont streaming
  # Features: continuous batching, prefix caching, OpenAI-compatible API
  # ---------------------------------------------------------------------------
  vllm:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-latest}
    container_name: orc-vllm
    profiles: [gpu]
    restart: unless-stopped
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: vllm
      ai.local.service_class: llm-local
      ai.local.exposure_class: llm-local
      ai.local.profile: gpu
      ai.local.owner: llm
      ai.local.component: llm-backend
      ai.local.role: primary-gpu
    expose:
      - "8000"
    ports:
      - "${AI_LOCAL_BIND:-127.0.0.1}:8092:8000"
    environment:
      HF_HOME: /root/.cache/huggingface
      VLLM_WORKER_MULTIPROC_METHOD: spawn
    command:
      - "--model"
      - "${VLLM_MODEL:-Qwen/Qwen3-8B-AWQ}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-1024}"
      - "--gpu-memory-utilization"
      - "${VLLM_GPU_MEM_UTIL:-0.85}"
      - "--enable-prefix-caching"
      - "--dtype"
      - "float16"
      - "--quantization"
      - "awq_marlin"
      - "--served-model-name"
      - "${VLLM_SERVED_MODEL:-qwen3:8b}"
      - "--trust-remote-code"
      - "--enforce-eager"
    volumes:
      - type: bind
        source: ${HF_CACHE_DIR:-.local/data/cache/hf}
        target: /root/.cache/huggingface
    networks:
      - ai-local
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: ${VLLM_MEM_LIMIT:-12g}
          cpus: "${VLLM_CPUS_LIMIT:-4.0}"
          pids: ${VLLM_PIDS_LIMIT:-1024}
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      start_period: 120s
      retries: 5
networks:
  ai-local:
    driver: bridge
    name: ai-local-net
