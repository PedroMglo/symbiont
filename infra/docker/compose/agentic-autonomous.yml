# =============================================================================
## Agentic autonomous opt-in overlay
# =============================================================================
# Use only after Fase 12 readiness/evals are green:
#
#   docker compose -p ai-local \
#     --env-file .env.storage.generated \
#     --env-file .env.llm.generated \
#     --env-file .env.services.generated \
#     -f infra/docker/compose/storage-guardian.yml \
#     -f infra/docker/compose/rag.yml \
#     -f infra/docker/compose/symbiont.yml \
#     -f infra/docker/compose/agentic-autonomous.yml \
#     --profile core --profile storage up -d --build
#
# The base config remains supervised. This overlay promotes only the selected
# runtime instance to default_mode=autonomous while preserving governed flags:
# runner_execute_proposals=false, high-risk approval-only, deny denied, command
# tool sandboxed without user/host context by default.
# =============================================================================

services:
  symbiont:
    environment:
      ORC_AGENTIC_RUNTIME_DEFAULT_MODE: ${ORC_AGENTIC_RUNTIME_DEFAULT_MODE:-autonomous}
      ORC_AGENTIC_RUNTIME_POLICY_MODE: ${ORC_AGENTIC_RUNTIME_POLICY_MODE:-enforce}
      ORC_AGENTIC_RUNTIME_RUNNER_ENABLED: ${ORC_AGENTIC_RUNTIME_RUNNER_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_RUNNER_EXECUTE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_RUNNER_EXECUTE_PROPOSALS:-false}
      ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS:-1200}
      ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS:-600}
      ORC_AGENTIC_RUNTIME_AUTONOMOUS_SAFE_ENABLED: ${ORC_AGENTIC_RUNTIME_AUTONOMOUS_SAFE_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_EVENT_LOOP_ENABLED: ${ORC_AGENTIC_RUNTIME_EVENT_LOOP_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_EVENT_LOOP_VLLM_UNHEALTHY_ENABLED: ${ORC_AGENTIC_RUNTIME_EVENT_LOOP_VLLM_UNHEALTHY_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_AUTONOMOUS_MAINTENANCE_ENABLED: ${ORC_AGENTIC_RUNTIME_AUTONOMOUS_MAINTENANCE_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_GOVERNED_IMPROVEMENT_ENABLED: ${ORC_AGENTIC_RUNTIME_GOVERNED_IMPROVEMENT_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_APPLY_RUNTIME_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_APPLY_RUNTIME_FLAGS:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_CLOSED_LOOP_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_CLOSED_LOOP_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_RENEW_ENFORCED_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_RENEW_ENFORCED_FLAGS:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_ROLLBACK_MISSING_FLAGS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_AUTO_ROLLBACK_MISSING_FLAGS:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_LADDER_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_LADDER_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_CREATE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_CREATE_PROPOSALS:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_ENABLED: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_CREATE_PROPOSALS: ${ORC_AGENTIC_RUNTIME_ACTUATOR_ESCALATION_POLICY_ROUTER_CREATE_PROPOSALS:-true}
      ORC_AGENTIC_RUNTIME_PREAPPROVAL_WINDOWS_ENABLED: ${ORC_AGENTIC_RUNTIME_PREAPPROVAL_WINDOWS_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ENABLED: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ENABLED:-true}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND:-workspace_execution}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DEFAULT_CONTEXT_PROFILE: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DEFAULT_CONTEXT_PROFILE:-project_context}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SANDBOX_IMAGE: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SANDBOX_IMAGE:-ai-local-command-sandbox:latest}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS:-120}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES:-64000}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SESSION_TTL_SECONDS: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_SESSION_TTL_SECONDS:-2160}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_COMMANDS_PER_SESSION: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_COMMANDS_PER_SESSION:-40}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_MEMORY_LIMIT_MB: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_MEMORY_LIMIT_MB:-512}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_PIDS_LIMIT: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_DOCKER_PIDS_LIMIT:-192}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_USER_CONTEXT_RO: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_USER_CONTEXT_RO:-false}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_HOST_CONTEXT_RO: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_ALLOW_HOST_CONTEXT_RO:-false}
