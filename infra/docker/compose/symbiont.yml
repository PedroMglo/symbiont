# =============================================================================
# ai-symbiont — Docker Compose
# =============================================================================
# Usage (from ai-local repo root):
#   docker compose --profile core up -d       — Start symbiont gateway
#   docker compose --profile agents up -d     — Start agent services
#   docker compose --profile features up -d   — Start feature services
#
# Profiles:
#   core          — symbiont gateway + lifecycle docker proxy
#   agents        — reasoning-and-response, local-evidence-operator,
#                   execution-policy-operator, material-builder
#   material      — material-builder, material-execution-kernel,
#                   workspace-execution, execution-policy-operator
#   features      — research, workspace-execution, execution-policy-operator,
#                   material-builder, material-execution-kernel,
#                   personal-context, extrator
#   heavy         — audio-transcribe (GPU)
#
# Security:
#   API keys are passed as Docker secrets (mounted at /run/secrets/).
#   Secrets are local files stored in infra/docker/secrets/ by default.
#   Services refuse to start without valid secrets.
#
# Ollama:
#   Runs natively on host. Containers access it through the internal TLS proxy.
# =============================================================================

# --- Shared configuration fragments ---
x-common-env: &common-env
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-https://ollama-proxy:11434}
  AI_LOCAL_TLS_DIR: /run/ai-local-tls
  SSL_CERT_FILE: /run/ai-local-tls/ca-bundle.crt
  REQUESTS_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
  CURL_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
  LOG_FORMAT: json
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
x-secure-service: &secure-service
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 30s
x-gpu-service: &gpu-service
  init: true
  security_opt:
    - no-new-privileges:true
  stop_grace_period: 60s
x-clickhouse-service: &clickhouse-service
  init: true
  security_opt:
    - no-new-privileges:true
  stop_grace_period: 60s
x-common-labels: &common-labels
  ai.local.managed: "true"
x-tls-volume: &tls-volume ${AI_LOCAL_TLS_DIR_HOST:-../../../.local/tls}:/run/ai-local-tls:z
# --- Secrets (local files managed in infra/docker/secrets/) ---
secrets:
  orc_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/orc_api_key
  ollama_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/ollama_api_key
  rag_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/rag_api_key
  qdrant_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/qdrant_api_key
  audio_transcribe_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/audio_transcribe_api_key
  internal_api_key:
    file: ${ORC_SECRETS_DIR:-../../../infra/docker/secrets}/internal_api_key
  github_token:
    environment: GITHUB_TOKEN
# --- Network ---
networks:
  ai-local:
    driver: bridge
    name: ai-local-net
# =============================================================================
services:
  ollama-proxy:
    !!merge <<: *secure-service
    build:
      context: ../../..
      dockerfile: infra/docker/images/symbiont/base/Dockerfile.base
      ssh:
        - default
      secrets:
        - github_token
      args:
        AI_LOCAL_GIT_URL_INSTEAD_OF: ${AI_LOCAL_GIT_URL_INSTEAD_OF:-}
    image: ai-local-base:${AI_LOCAL_BASE_TAG:-dev}
    container_name: orc-ollama-proxy
    profiles: ["core"]
    restart: unless-stopped
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: ollama-proxy
      ai.local.service_class: internal
      ai.local.exposure_class: internal
      ai.local.component: core
      ai.local.profile: core
      ai.local.owner: symbiont
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "11434"
    environment:
      SERVICE_NAME: ollama-proxy
      AI_LOCAL_TLS_DIR: /run/ai-local-tls
      AI_LOCAL_TLS_DNS_NAMES: ollama-proxy,orc-ollama-proxy,localhost
      OLLAMA_PROXY_LISTEN_HOST: "0.0.0.0"
      OLLAMA_PROXY_LISTEN_PORT: "11434"
      OLLAMA_PROXY_UPSTREAM_HOST: ${OLLAMA_PROXY_UPSTREAM_HOST:-host.docker.internal}
      OLLAMA_PROXY_UPSTREAM_PORT: "${OLLAMA_PROXY_UPSTREAM_PORT:-11434}"
      SSL_CERT_FILE: /run/ai-local-tls/ca-bundle.crt
      REQUESTS_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
      CURL_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
    command: ["python", "/app/ollama_tls_proxy.py"]
    volumes:
      - ../../../infra/docker/ollama_tls_proxy.py:/app/ollama_tls_proxy.py:ro,z
      - *tls-volume
    networks:
      - ai-local

    deploy:
      resources:
        limits:
          memory: ${OLLAMA_PROXY_MEM_LIMIT:-128m}
          cpus: "${OLLAMA_PROXY_CPUS:-0.25}"
          pids: ${OLLAMA_PROXY_PIDS_LIMIT:-128}
        reservations:
          memory: ${OLLAMA_PROXY_MEM_RESERVATION:-32m}

    healthcheck:
      test:
        ["CMD-SHELL", "curl -skf https://localhost:11434/api/tags >/dev/null"]
      interval: 15s
      timeout: 5s
      start_period: 5s
      retries: 3

  # ===========================================================================
  # CORE PROFILE — Minimum functional stack
  # ===========================================================================
  symbiont:
    !!merge <<: *secure-service
    build:
      context: ../../..
      dockerfile: infra/docker/images/symbiont/services/symbiont.Dockerfile
      args:
        AI_LOCAL_BASE_TAG: ${AI_LOCAL_BASE_TAG:-dev}
    image: ai-local-symbiont:${AI_LOCAL_IMAGE_TAG:-dev}
    container_name: orc-symbiont
    profiles: ["core"]
    restart: unless-stopped
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: symbiont
      ai.local.service_class: gateway-public
      ai.local.exposure_class: gateway-public
      ai.local.component: core
      ai.local.profile: core
      ai.local.owner: symbiont
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AI_LOCAL_BIND:-127.0.0.1}:${ORC_PORT_SYMBIONT:-8586}:8585"
    environment:
      !!merge <<: *common-env
      SERVICE_NAME: symbiont
      ORC_API_HOST: "0.0.0.0"
      ORC_API_PORT: "8585"
      ORC_SESSION_DB_PATH: /app/data/symbiont/sessions.db
      AI_ORC_SETTINGS_DIR: /app/config/orc
      ORC_SYMBIONT_API_KEY_FILE: /run/secrets/orc_api_key
      ORC_RAG_URL: ${ORC_SERVICES_RAG_URL:-https://rag:8484}
      ORC_OLLAMA_BASE_URL: ${ORC_OLLAMA_BASE_URL:-https://ollama-proxy:11434}
      ORC_LLM_BACKEND_OLLAMA_ENABLED: ${ORC_LLM_BACKEND_OLLAMA_ENABLED:-true}
      ORC_LLM_BACKEND_OLLAMA_ACCELERATOR: ${ORC_LLM_BACKEND_OLLAMA_ACCELERATOR:-cpu}
      ORC_LLM_BACKEND_LLAMA_CPP_AUX_ENABLED: ${ORC_LLM_BACKEND_LLAMA_CPP_AUX_ENABLED:-false}
      ORC_LLM_BACKEND_LLAMA_CPP_FAST_ENABLED: ${ORC_LLM_BACKEND_LLAMA_CPP_FAST_ENABLED:-false}
      ORC_LLM_BACKEND_VLLM_ENABLED: ${ORC_LLM_BACKEND_VLLM_ENABLED:-false}
      ORC_SERVICES_LLAMA_CPP_AUX_URL: ${ORC_SERVICES_LLAMA_CPP_AUX_URL:-https://llama-cpp-aux:8080}
      ORC_SERVICES_LLAMA_CPP_FAST_URL: ${ORC_SERVICES_LLAMA_CPP_FAST_URL:-https://llama-cpp-fast:8080}
      ORC_SERVICES_VLLM_URL: ${ORC_SERVICES_VLLM_URL:-https://vllm:8000}
      ORC_SERVICES_REASONING_AND_RESPONSE_URL: ${ORC_SERVICES_REASONING_AND_RESPONSE_URL:-https://reasoning-and-response:8000}
      ORC_SERVICES_RESEARCH_URL: ${ORC_SERVICES_RESEARCH_URL:-https://research:8000}
      ORC_SERVICES_PERSONAL_CONTEXT_URL: ${ORC_SERVICES_PERSONAL_CONTEXT_URL:-https://personal-context:8000}
      ORC_SERVICES_LOCAL_EVIDENCE_OPERATOR_URL: ${ORC_SERVICES_LOCAL_EVIDENCE_OPERATOR_URL:-https://local-evidence-operator:8000}
      ORC_SERVICES_EXECUTION_POLICY_OPERATOR_URL: ${ORC_SERVICES_EXECUTION_POLICY_OPERATOR_URL:-https://execution-policy-operator:8000}
      ORC_SERVICES_MATERIAL_BUILDER_URL: ${ORC_SERVICES_MATERIAL_BUILDER_URL:-https://material-builder:8000}
      ORC_SERVICES_MATERIAL_EXECUTION_KERNEL_URL: ${ORC_SERVICES_MATERIAL_EXECUTION_KERNEL_URL:-https://material-execution-kernel:8000}
      ORC_SERVICES_EXTRATOR_URL: ${ORC_SERVICES_EXTRATOR_URL:-https://extrator:8000}
      ORC_SERVICES_AUDIO_TRANSCRIBE_URL: ${ORC_SERVICES_AUDIO_TRANSCRIBE_URL:-https://audio-transcribe:8080}
      ORC_SERVICES_AUDIO_STREAMING_URL: ${ORC_SERVICES_AUDIO_STREAMING_URL:-https://audio-streaming:8087}
      ORC_SERVICES_STORAGE_GUARDIAN_URL: ${ORC_SERVICES_STORAGE_GUARDIAN_URL:-https://storage-guardian:8730}
      AI_LOCAL_STORAGE_MODE: ${AI_LOCAL_STORAGE_MODE:-}
      AI_LOCAL_STORAGE_ROOT: ${AI_LOCAL_STORAGE_ROOT:-}
      AI_STORAGE_EXTERNAL_ROOT: ${AI_STORAGE_EXTERNAL_ROOT:-}
      AI_STORAGE_HOST_BIND_ROOT: ${AI_STORAGE_HOST_BIND_ROOT:-}
      AI_STORAGE_CONTAINER_BIND_ROOT: ${AI_STORAGE_CONTAINER_BIND_ROOT:-}
      AI_STORAGE_REQUIRE_EXTERNAL: ${AI_STORAGE_REQUIRE_EXTERNAL:-false}
      AI_STORAGE_ALLOW_LOCAL_HEAVY_FALLBACK: ${AI_STORAGE_ALLOW_LOCAL_HEAVY_FALLBACK:-false}
      # The host bind source is still `${SYMBIONT_DATA_DIR}` in `volumes`.
      # Inside the container, Symbiont must write through the mounted runtime
      # path instead of the host path, which may also be mounted read-only for
      # evidence acquisition.
      SYMBIONT_DATA_DIR: /app/data
      SYMBIONT_LOGS_DIR: /app/logs
      EXTRATOR_DATA_DIR: ${EXTRATOR_DATA_DIR:-}
      LOCAL_EVIDENCE_OPERATOR_DATA_DIR: ${LOCAL_EVIDENCE_OPERATOR_DATA_DIR:-}
      EXECUTION_POLICY_OPERATOR_DATA_DIR: ${EXECUTION_POLICY_OPERATOR_DATA_DIR:-}
      AUDIO_TRANSCRIBE_DATA_DIR: ${AUDIO_TRANSCRIBE_DATA_DIR:-}
      RAG_DATA_DIR: ${RAG_DATA_DIR:-}
      QDRANT_DATA_DIR: ${QDRANT_DATA_DIR:-}
      REDIS_DATA_DIR: ${REDIS_DATA_DIR:-}
      STORAGE_GUARDIAN_DATA_DIR: ${STORAGE_GUARDIAN_DATA_DIR:-}
      ORC_SERVICES_TRANSLATION_URL: ${ORC_SERVICES_TRANSLATION_URL:-https://translation:8590}
      ORC_SERVICES_LANGFUSE_URL: ${ORC_SERVICES_LANGFUSE_URL:-https://langfuse:3000}
      ORC_SERVICES_CLICKHOUSE_URL: ${ORC_SERVICES_CLICKHOUSE_URL:-https://clickhouse:8123}
      ORC_SERVICES_OTEL_ENDPOINT: ${ORC_SERVICES_OTEL_ENDPOINT:-https://otel-collector:4318}
      OLLAMA_API_KEY_FILE: /run/secrets/ollama_api_key
      AI_MODELS_REGISTRY: /app/config/models/orc.config.json
      RAG_API_KEY_FILE: /run/secrets/rag_api_key
      QDRANT_API_KEY_FILE: /run/secrets/qdrant_api_key
      INTERNAL_API_KEY_FILE: /run/secrets/internal_api_key
      STORAGE_GUARDIAN_INTERNAL_TOKEN_FILE: /run/secrets/internal_api_key
      AUDIO_TRANSCRIBE_API_KEY_FILE: /run/secrets/audio_transcribe_api_key
      AI_RESOURCE_GOVERNOR_CONFIG_PATH: /app/config/resource_governor.yaml
      AI_RESOURCE_GOVERNOR_POLICY_SNAPSHOT_PATH: /app/config/generated/resource_governor_policy.json
      AI_TELEMETRY_AUTHORITY_URL: ${AI_TELEMETRY_AUTHORITY_URL:-}
      AI_TELEMETRY_AUTHORITY_TOKEN_FILE: /run/secrets/internal_api_key
      AI_TELEMETRY_AUTHORITY_CA_BUNDLE_PATH: ${AI_TELEMETRY_AUTHORITY_CA_BUNDLE_PATH:-/run/ai-local-tls/ca-bundle.crt}
      AI_TELEMETRY_AUTHORITY_CACHE_TTL_SECONDS: ${AI_TELEMETRY_AUTHORITY_CACHE_TTL_SECONDS:-1.5}
      AI_TELEMETRY_AUTHORITY_TIMEOUT_SECONDS: ${AI_TELEMETRY_AUTHORITY_TIMEOUT_SECONDS:-2.0}
      HOST_HOME_PREFIX: ${HOST_HOME_PREFIX:-${AI_LOCAL_HOST_ALLOWED_ROOT:-${HOME}}}
      CLICKHOUSE_URL: ${ORC_SERVICES_CLICKHOUSE_URL:-https://clickhouse:8123}
      # Docker CLI uses tcp:// plus TLS envs; the lifecycle SDK still uses
      # https://docker-proxy:2375 from lifecycle.toml.
      DOCKER_HOST: tcp://docker-proxy:2375
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /run/ai-local-tls/services/symbiont
      AI_LOCAL_HOST_HOME: ${AI_LOCAL_HOST_HOME:-${AI_LOCAL_HOST_ALLOWED_ROOT:-${HOME}}}
      AI_LOCAL_HOST_PROJECT_ROOT: ${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}
      ORC_LIFECYCLE_COMPOSE_PROJECT_DIR: ${ORC_LIFECYCLE_COMPOSE_PROJECT_DIR:-${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}}
      ORC_DISPATCH_CONTEXT_BUDGET_TOKENS: ${ORC_DISPATCH_CONTEXT_BUDGET_TOKENS:-6000}
      ORC_DISPATCH_CONTEXT_TIMEOUT_PER_SOURCE: ${ORC_DISPATCH_CONTEXT_TIMEOUT_PER_SOURCE:-10.0}
      ORC_DISPATCH_FEATURE_BUDGET_TOKENS: ${ORC_DISPATCH_FEATURE_BUDGET_TOKENS:-2000}
      ORC_DISPATCH_FEATURE_TIMEOUT_SECONDS: ${ORC_DISPATCH_FEATURE_TIMEOUT_SECONDS:-10.0}
      ORC_DISPATCH_CONTEXT_PARALLEL_MAX_WORKERS: ${ORC_DISPATCH_CONTEXT_PARALLEL_MAX_WORKERS:-8}
      ORC_DISPATCH_AGENT_BUDGET_TOKENS: ${ORC_DISPATCH_AGENT_BUDGET_TOKENS:-2000}
      ORC_DISPATCH_AGENT_TIMEOUT_SECONDS: ${ORC_DISPATCH_AGENT_TIMEOUT_SECONDS:-120.0}
      ORC_DISPATCH_AGENT_TIMEOUT_REASONING_AND_RESPONSE: ${ORC_DISPATCH_AGENT_TIMEOUT_REASONING_AND_RESPONSE:-30.0}
      MATERIAL_EXECUTION_KERNEL_SESSION_BUDGET_SECONDS: ${MATERIAL_EXECUTION_KERNEL_SESSION_BUDGET_SECONDS:-870}
      MATERIAL_EXECUTION_KERNEL_NO_PROGRESS_WATCHDOG_SECONDS: ${MATERIAL_EXECUTION_KERNEL_NO_PROGRESS_WATCHDOG_SECONDS:-120}
      MATERIAL_EXECUTION_KERNEL_BUILDER_TIMEOUT_SECONDS: ${MATERIAL_EXECUTION_KERNEL_BUILDER_TIMEOUT_SECONDS:-870}
      MATERIAL_EXECUTION_KERNEL_WORKSPACE_TIMEOUT_SECONDS: ${MATERIAL_EXECUTION_KERNEL_WORKSPACE_TIMEOUT_SECONDS:-180}
      ORC_DISPATCH_AGENT_TIMEOUT_REASONING_AND_RESPONSE_DIRECT: ${ORC_DISPATCH_AGENT_TIMEOUT_REASONING_AND_RESPONSE_DIRECT:-150.0}
      ORC_DISPATCH_AGENT_TIMEOUT_AUDIO_TRANSCRIBE: ${ORC_DISPATCH_AGENT_TIMEOUT_AUDIO_TRANSCRIBE:-120.0}
      ORC_DISPATCH_STREAMING_MAX_CONTEXT_BUDGET_TOKENS: ${ORC_DISPATCH_STREAMING_MAX_CONTEXT_BUDGET_TOKENS:-600}
      ORC_DISPATCH_STREAMING_MAX_TOKENS: ${ORC_DISPATCH_STREAMING_MAX_TOKENS:-1020}
      ORC_DISPATCH_STREAMING_TIMEOUT_SECONDS: ${ORC_DISPATCH_STREAMING_TIMEOUT_SECONDS:-120.0}
      ORC_DYNAMIC_ROUTING_ROUTING_TIMEOUT: ${ORC_DYNAMIC_ROUTING_ROUTING_TIMEOUT:-5.0}
      ORC_DYNAMIC_ROUTING_MAX_AGENTS_PER_REQUEST: ${ORC_DYNAMIC_ROUTING_MAX_AGENTS_PER_REQUEST:-4}
      ORC_DYNAMIC_ROUTING_PER_AGENT_TIMEOUT: ${ORC_DYNAMIC_ROUTING_PER_AGENT_TIMEOUT:-120.0}
      ORC_DYNAMIC_ROUTING_TOTAL_BUDGET_TOKENS: ${ORC_DYNAMIC_ROUTING_TOTAL_BUDGET_TOKENS:-15000}
      ORC_DYNAMIC_ROUTING_DECOMPOSITION_TIMEOUT: ${ORC_DYNAMIC_ROUTING_DECOMPOSITION_TIMEOUT:-5.0}
      ORC_DYNAMIC_ROUTING_NEGOTIATION_TIMEOUT: ${ORC_DYNAMIC_ROUTING_NEGOTIATION_TIMEOUT:-1.0}
      ORC_DYNAMIC_ROUTING_MAX_SUBTASKS: ${ORC_DYNAMIC_ROUTING_MAX_SUBTASKS:-5}
      ORC_AGENTS_COLLABORATION_MAX_ROUNDS: ${ORC_AGENTS_COLLABORATION_MAX_ROUNDS:-2}
      ORC_AGENTS_COLLABORATION_ROUND_TIMEOUT_SECONDS: ${ORC_AGENTS_COLLABORATION_ROUND_TIMEOUT_SECONDS:-5.0}
      ORC_AGENTS_COLLABORATION_MAX_MEMORY_ENTRIES: ${ORC_AGENTS_COLLABORATION_MAX_MEMORY_ENTRIES:-10}
      ORC_AGENTS_COLLABORATION_MEMORY_TTL_SECONDS: ${ORC_AGENTS_COLLABORATION_MEMORY_TTL_SECONDS:-300}
      ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_TASK_DEFAULT_TIMEOUT_SECONDS:-1200}
      ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_MATERIAL_DECISION_TIMEOUT_SECONDS:-600}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_BACKEND:-workspace_execution}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_TIMEOUT_SECONDS:-120}
      ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES: ${ORC_AGENTIC_RUNTIME_COMMAND_TOOL_MAX_OUTPUT_BYTES:-64000}
      ORC_LIFECYCLE_IDLE_TIMEOUT: ${ORC_LIFECYCLE_IDLE_TIMEOUT:-600}
      ORC_LIFECYCLE_IDLE_CHECK_INTERVAL: ${ORC_LIFECYCLE_IDLE_CHECK_INTERVAL:-15}
      ORC_LIFECYCLE_PRESSURE_REAP_MIN_IDLE_SECONDS: ${ORC_LIFECYCLE_PRESSURE_REAP_MIN_IDLE_SECONDS:-60}
      ORC_LIFECYCLE_PRESSURE_REAP_MAX_PER_CYCLE: ${ORC_LIFECYCLE_PRESSURE_REAP_MAX_PER_CYCLE:-3}
      ORC_LIFECYCLE_OVERRIDES_REASONING_AND_RESPONSE_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_REASONING_AND_RESPONSE_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_RESEARCH_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_RESEARCH_IDLE_TIMEOUT:-1200}
      ORC_LIFECYCLE_OVERRIDES_LOCAL_EVIDENCE_OPERATOR_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_LOCAL_EVIDENCE_OPERATOR_IDLE_TIMEOUT:-600}
      ORC_LIFECYCLE_OVERRIDES_EXECUTION_POLICY_OPERATOR_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_EXECUTION_POLICY_OPERATOR_IDLE_TIMEOUT:-600}
      ORC_LIFECYCLE_OVERRIDES_PERSONAL_CONTEXT_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_PERSONAL_CONTEXT_IDLE_TIMEOUT:-600}
      ORC_LIFECYCLE_OVERRIDES_EXTRATOR_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_EXTRATOR_IDLE_TIMEOUT:-1800}
      ORC_LIFECYCLE_OVERRIDES_TRANSLATION_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_TRANSLATION_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_AUDIO_TRANSCRIBE_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_AUDIO_TRANSCRIBE_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_AUDIO_STREAMING_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_AUDIO_STREAMING_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_MATERIAL_BUILDER_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_MATERIAL_BUILDER_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_MATERIAL_EXECUTION_KERNEL_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_MATERIAL_EXECUTION_KERNEL_IDLE_TIMEOUT:-900}
      ORC_LIFECYCLE_OVERRIDES_WORKSPACE_EXECUTION_IDLE_TIMEOUT: ${ORC_LIFECYCLE_OVERRIDES_WORKSPACE_EXECUTION_IDLE_TIMEOUT:-900}
      ORC_PREWARMING_TTL_UNUSED_SECONDS: ${ORC_PREWARMING_TTL_UNUSED_SECONDS:-300}
      ORC_PREWARMING_MAX_PREWARM_PER_REQUEST: ${ORC_PREWARMING_MAX_PREWARM_PER_REQUEST:-2}
      ORC_PREWARMING_MAX_GPU_PREWARM_PER_REQUEST: ${ORC_PREWARMING_MAX_GPU_PREWARM_PER_REQUEST:-0}
    secrets:
      - orc_api_key
      - ollama_api_key
      - rag_api_key
      - qdrant_api_key
      - internal_api_key
      - audio_transcribe_api_key
    volumes:
      - ${ORC_MODELS_CONFIG:-../../../config/models/orc.config.json}:/app/config/models/orc.config.json:ro,z
      - ${AI_ORC_SETTINGS_DIR_HOST:-../../../config/orc}:/app/config/orc:ro,z
      - ${AI_RESOURCE_GOVERNOR_CONFIG_HOST:-../../../config/resource_governor.yaml}:/app/config/resource_governor.yaml:ro,z
      - ${AI_RESOURCE_GOVERNOR_GENERATED_HOST:-../../../.local/generated}:/app/config/generated:ro,z
      - ${SYMBIONT_DATA_DIR:-../../../.local/data/symbiont}:/app/data:z
      - ${AI_LOCAL_LOGS_ROOT:-../../../.local/logs}/symbiont:/app/logs:z
      - ${AI_LOCAL_HOST_ALLOWED_ROOT:-${HOME}}:/host_home:ro,z
      - ${AUDIO_TRANSCRIBE_DATA_DIR:-../../../.local/data/audio}/input:/app/audio_input:z
      - ${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}:/project:ro,z
      - ${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}:${AI_LOCAL_HOST_PROJECT_ROOT:-${PWD}}:ro,z
      - ${ORC_LIFECYCLE_HOST_PROJECT_ROOT:-.}:${ORC_LIFECYCLE_PROJECT_DIR:-/workspace/project}:ro,z
      - *tls-volume
    networks:
      - ai-local
    depends_on:
      ollama-proxy:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${SYMBIONT_MEM_LIMIT:-1g}
          cpus: "${SYMBIONT_CPUS_LIMIT:-2.0}"
          pids: ${SYMBIONT_PIDS_LIMIT:-512}
        reservations:
          memory: ${SYMBIONT_MEM_RESERVATION:-256m}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -skf https://localhost:8585${SYMBIONT_HEALTHCHECK_PATH:-/live}",
        ]
      interval: 15s
      timeout: ${SYMBIONT_HEALTHCHECK_TIMEOUT:-5s}
      start_period: 30s
      retries: 3
  # --- Docker Socket Proxy (container lifecycle management) ---
  docker-proxy:
    image: ai-local-docker-socket-proxy:${AI_LOCAL_IMAGE_TAG:-dev}
    container_name: orc-docker-proxy
    profiles: ["core"]
    user: "1000:1000"
    group_add:
      - "${AI_LOCAL_DOCKER_GID:-1000}"
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat /run/ai-local-tls/services/docker-proxy/tls.crt /run/ai-local-tls/services/docker-proxy/tls.key > /tmp/docker-proxy.pem
        sed 's|$${BIND_CONFIG}|[::]:2375 v4v6 ssl crt /tmp/docker-proxy.pem alpn http/1.1|g' /usr/local/etc/haproxy/haproxy.cfg.template > /tmp/haproxy.cfg
        exec haproxy -W -db -p /tmp/haproxy.pid -f /tmp/haproxy.cfg
    logging: *logging
    labels:
      !!merge <<: *common-labels
      ai.local.service: docker-proxy
      ai.local.service_class: internal
      ai.local.exposure_class: internal
      ai.local.component: core
      ai.local.profile: core
      ai.local.owner: symbiont
    environment:
      # Allow lifecycle manager to manage containers via compose
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NETWORKS: 1
      NODES: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EXEC: 0
      GRPC: 0
      IMAGES: 1
      INFO: 1
      PLUGINS: 0
      POST: 1
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
      VOLUMES: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - *tls-volume
    networks:
      - ai-local
    deploy:
      resources:
        limits:
          memory: ${DOCKER_PROXY_MEM_LIMIT:-64m}
          cpus: "${DOCKER_PROXY_CPUS_LIMIT:-0.25}"
          pids: ${DOCKER_PROXY_PIDS_LIMIT:-64}
        reservations:
          memory: ${DOCKER_PROXY_MEM_RESERVATION:-16m}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate --spider -q https://localhost:2375/version || exit 1",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 2
