      - "8087"
    environment:
      AI_LOCAL_TLS_DIR: /run/ai-local-tls
      SSL_CERT_FILE: /run/ai-local-tls/ca-bundle.crt
      REQUESTS_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
      CURL_CA_BUNDLE: /run/ai-local-tls/ca-bundle.crt
      SERVICE_NAME: audio-streaming
      STREAM_PORT: "8087"
      AUDIO_TRANSCRIBE_API_KEY_FILE: /run/secrets/audio_transcribe_api_key
      REDIS_URL: redis://redis:6379/0
      WHISPER_MODEL: distil-large-v3
      WHISPER_COMPUTE_TYPE: int8_float16
      GPU_WORKERS: "1"
      VAD_ENERGY_THRESHOLD_DB: "-35.0"
      TMPDIR: /temp
      AI_LOCAL_AGENT_TEMP_ROOT: /temp
      AUDIO_OUTPUT_DIR: /temp/audio-streaming/output
      LOG_LEVEL: INFO
      HF_HOME: /models/huggingface
      STORAGE_GUARDIAN_URL: ${ORC_SERVICES_STORAGE_GUARDIAN_URL:-https://storage-guardian:8730}
      STORAGE_GUARDIAN_INTERNAL_TOKEN_FILE: /run/secrets/internal_api_key
      STORAGE_GUARDIAN_REQUIRED: "true"
    secrets:
      - audio_transcribe_api_key
      - internal_api_key
    volumes:
      - type: bind
        source: ${AUDIO_TRANSCRIBE_DATA_DIR:-../../../.local/data/audio}
        target: /data
        read_only: true
        bind:
          create_host_path: false
      - ${AI_LOCAL_HOST_ALLOWED_ROOT:-${HOME}}:/host_home:ro,z
      - type: bind
        source: ${HF_CACHE_DIR:-../../../.local/data/cache/hf}
        target: /models/huggingface
        bind:
          create_host_path: false
      - *tls-volume
    tmpfs:
      - /temp:rw,noexec,nosuid,nodev,size=1g,uid=1000,gid=1000,mode=1777
      - /tmp:rw,noexec,nosuid,nodev,size=1g,uid=1000,gid=1000,mode=1777
    networks:
      - ai-local
    depends_on:
      redis:
        condition: service_healthy
      audio-transcribe:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${AUDIO_STREAMING_MEM_LIMIT:-4g}
          cpus: "${AUDIO_STREAMING_CPUS_LIMIT:-4.0}"
          pids: ${AUDIO_STREAMING_PIDS_LIMIT:-1024}
        reservations:
          memory: ${AUDIO_STREAMING_MEM_RESERVATION:-1g}
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-skf", "https://localhost:8087/health"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 3
