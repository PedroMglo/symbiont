# Predictive Prewarming — Feature Catalog
# All service metadata for the prewarm prediction engine.
# Keywords, patterns, and costs are used by the rule router and embedding router.
# Modify this file to add/remove services or adjust prediction accuracy.

[features.audio_transcribe]
display_name = "Audio Transcription"
description = "Speech and media processing service for transcription, subtitles, diarization, and spoken-audio extraction."
container_name = "audio-transcribe"
startup_cost = "high"
uses_gpu = true
prewarm_policy = "standard"
prewarm_threshold = 0.70
ttl_idle = 900
priority = 3
capabilities = ["speech-to-text", "audio transcription", "video subtitles", "speaker diarization", "recording analysis"]
inputs = ["audio files", "video files", "recordings", "media attachments"]
operations = ["transcribe", "generate subtitles", "detect speakers", "extract spoken text"]
keywords = [
    "transcreve", "transcrever", "transcrição", "transcricao",
    "transcribe", "transcription", "transcribing",
    "áudio", "audio", "áudios", "audios",
    "whisper", "legendas", "subtitles", "legenda", "subtitle",
    "speaker", "diarization", "diarização",
]
file_extensions = ["mp3", "wav", "m4a", "flac", "ogg", "mp4", "mkv", "webm", "mov", "avi"]
patterns = [
    "transcreve[r]?\\s+(o|este|a|as|os|todos|tudo)",
    "transcribe\\s+(the|this|all)",
    "gera[r]?\\s+legendas",
    "generate\\s+subtitles",
]
negative_keywords = []
negative_patterns = []
example_queries = [
    "Transcreve este ficheiro de áudio",
    "Transcribe this MP3 file",
    "Gera legendas para este vídeo",
    "Quem fala neste áudio?",
    "Transcreve a reunião gravada",
    "Generate subtitles for this recording",
]

[features.local_evidence_operator]
display_name = "Local Evidence Operator"
description = "Consolidated read-only local evidence service for code, repositories, data, ops, Compose, and local security diagnostics."
container_name = "local-evidence-operator"
startup_cost = "medium"
uses_gpu = false
prewarm_policy = "standard"
prewarm_threshold = 0.85
ttl_idle = 600
priority = 4
capabilities = [
    "code understanding",
    "repository analysis",
    "dependency analysis",
    "data profiling",
    "schema drift",
    "SQLite introspection",
    "log diagnostics",
    "Docker Compose analysis",
    "local security evidence",
    "redaction",
]
inputs = ["source files", "repositories", "stack traces", "datasets", "SQLite databases", "logs", "Compose files", "local evidence"]
operations = ["analyze code", "trace callers", "inspect imports", "profile dataset", "detect schema drift", "inspect Compose", "correlate security evidence", "redact sensitive data"]
keywords = [
    "código", "code", "script", "programa", "program",
    "função", "function", "method", "método",
    "classe", "class", "refactor", "refactora", "refatorar",
    "bug", "bugs", "debug", "debugging", "depurar",
    "implementa", "implement", "escreve", "write",
    "repo", "repositório", "repository", "codebase",
    "depende", "dependência", "dependências", "depends", "dependency",
    "importa", "imports", "importação",
    "arquitectura", "arquitetura", "architecture", "structure", "estrutura",
    "módulo", "módulos", "module", "modules",
    "grafo", "graph", "upstream", "downstream",
    "dataset", "dados", "csv", "tsv", "jsonl", "ndjson",
    "sqlite", "sql", "schema", "esquema", "drift", "qualidade",
    "quality", "duplicates", "duplicados", "malformed", "reconcile",
    "logs", "log", "incidente", "incident", "timeline", "docker",
    "compose", "readiness", "healthcheck", "ambiente", "environment",
    "latência", "latency", "performance", "ops", "diagnostics",
    "security", "segurança", "vulnerability", "vulnerabilidade",
    "cve", "secret", "secrets", "token", "redact", "redação",
    "xss", "csrf", "sql injection", "auth", "trace", "traces",
]
file_extensions = ["py", "ts", "js", "rs", "go", "java", "c", "cpp", "h", "tsx", "jsx", "csv", "tsv", "jsonl", "ndjson", "sqlite", "db", "sqlite3", "gz", "zst", "log", "env", "yml", "yaml", "sarif"]
patterns = [
    "analisa\\s+(este|o|a)\\s+(código|repo|projeto|ficheiro)",
    "analyze\\s+(this|the)\\s+(code|repo|project|file)",
    "refactor[a]?\\s+",
    "como\\s+funciona\\s+(este|o)",
    "what\\s+(calls|depends|imports)",
    "quem\\s+(chama|depende|importa)",
    "analisa\\s+.*\\.(csv|tsv|jsonl|ndjson|sqlite|db)",
    "profile\\s+.*\\.(csv|tsv|jsonl|ndjson|sqlite|db)",
    "schema\\s+drift",
    "data\\s+quality",
    "docker\\s+compose",
    "incident\\s+timeline",
    "security\\s+(analysis|review)",
    "analisa\\s+.*seguran[çc]a",
    "redact\\s+.*(secret|token)",
]
negative_keywords = [
    "conceito", "teoria", "paradigma", "definição",
    "o que é", "what is", "explain what",
    "exemplo de", "example of",
    "notas", "notes", "vault", "obsidian",
]
negative_patterns = [
    "explica[r]?\\s+(o\\s+que|como)\\s+(é|são|funciona)\\s+(um|uma|o|a|programação|coding)",
    "(what|how)\\s+is\\s+(a|an|the)\\s+\\w+\\s+(in programming|in computer science)",
    "(nas?|no)\\s+(meu|minha|minhas|meus)\\s+(notas|vault|obsidian)",
    "(procura|search|find)\\s+.*(notas|notes|vault)",
    "(o\\s+que|que\\s+\\w+)\\s+(depende|chama|importa)\\s+d[oe]",
]
example_queries = [
    "Analisa este ficheiro Python",
    "O que depende deste módulo?",
    "Refactora esta função",
    "How does this pipeline work?",
    "What calls this function?",
    "Show the dependency graph",
    "Qual a arquitectura deste projecto?",
    "Profile this CSV dataset",
    "Diagnose this Docker Compose file",
    "Correlate local security evidence",
]

[features.personal_context]
display_name = "Personal Context"
description = "Personal context service for calendar, email, RSS, events, and user-specific briefings."
container_name = "personal-context"
startup_cost = "low"
uses_gpu = false
prewarm_policy = "standard"
prewarm_threshold = 0.72
ttl_idle = 900
priority = 4
capabilities = ["calendar lookup", "email lookup", "RSS lookup", "personal briefing", "event summary"]
inputs = ["calendar", "email", "RSS feeds", "dates", "personal account context"]
operations = ["show agenda", "summarize emails", "summarize news", "find meetings", "prepare briefing"]
keywords = [
    "calendário", "calendario", "calendar", "agenda",
    "eventos", "events", "evento", "event",
    "reunião", "reuniões", "meeting", "meetings",
    "email", "emails", "correio", "mail", "mails",
    "notícias", "noticias", "news", "feeds", "rss",
    "resumo", "briefing", "summary",
    "hoje", "today", "amanhã", "tomorrow",
    "semana", "week",
]
patterns = [
    "o\\s+que\\s+tenho\\s+(hoje|amanhã|esta\\s+semana)",
    "what\\s+(do\\s+I\\s+have|is\\s+on\\s+my)\\s+(today|tomorrow|this\\s+week)",
    "mostra\\s+(o\\s+)?(meu\\s+)?(calendário|agenda|emails|rss)",
    "show\\s+(my\\s+)?(calendar|agenda|emails|news|rss)",
    "resum[eo]\\s+(d[oa]s?\\s+)?(dia|semana|emails|notícias)",
]
negative_keywords = [
    "conceito", "teoria", "exemplo", "explicar",
    "o que é", "what is", "how does",
]
negative_patterns = [
    "o\\s+que\\s+(é|são|significa)\\s+(um|uma|o|a)",
    "explica[r]?\\s+(o\\s+que|como)",
]
example_queries = [
    "O que tenho na agenda hoje?",
    "Mostra os meus emails recentes",
    "What meetings do I have this week?",
    "Resumo das notícias de hoje",
    "Show my RSS feeds",
    "Tenho algum evento amanhã?",
]

