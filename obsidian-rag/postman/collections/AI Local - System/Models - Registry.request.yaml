$kind: http-request
description: List configured model roles, profiles and registry version.
url: "{{system_base_url}}/models"
method: GET
headers:
  Authorization: Bearer {{system_api_key}}
  X-AI-Service: postman
  X-AI-Feature: system-diagnostics
scripts:
  - type: afterResponse
    code: |-
      pm.test('models registry responds', function () {
        pm.expect(pm.response.code).to.eql(200);
      });
    language: text/javascript
order: 7000
