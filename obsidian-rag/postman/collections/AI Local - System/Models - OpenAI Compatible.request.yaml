$kind: http-request
description: List OpenAI-compatible model aliases exposed by ai-local.
url: "{{system_base_url}}/v1/models"
method: GET
headers:
  Authorization: Bearer {{system_api_key}}
  X-AI-Service: postman
  X-AI-Feature: system-diagnostics
scripts:
  - type: afterResponse
    code: |-
      pm.test('openai-compatible models listed', function () {
        pm.expect(pm.response.code).to.eql(200);
      });
    language: text/javascript
order: 8000
