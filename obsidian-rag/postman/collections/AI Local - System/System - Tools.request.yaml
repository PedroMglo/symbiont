$kind: http-request
description: List tools currently exported by the gateway for LLM function calling.
url: "{{system_base_url}}/tools"
method: GET
headers:
  Authorization: Bearer {{system_api_key}}
  X-AI-Service: postman
  X-AI-Feature: system-diagnostics
scripts:
  - type: afterResponse
    code: |-
      pm.test('tools listed', function () {
        pm.expect(pm.response.code).to.eql(200);
      });
    language: text/javascript
order: 6000
