$kind: http-request
description: List recent agentic tasks created by prompts, APIs, agents or runtime features.
url: "{{system_base_url}}/agentic/tasks?limit=20&offset=0"
method: GET
headers:
  Authorization: Bearer {{system_api_key}}
  X-AI-Service: postman
  X-AI-Feature: system-diagnostics
queryParams:
  - key: limit
    value: "20"
    description: 1..500
  - key: offset
    value: "0"
scripts:
  - type: afterResponse
    code: |-
      pm.test('tasks listed', function () {
        pm.expect(pm.response.code).to.eql(200);
      });
    language: text/javascript
order: 9000
