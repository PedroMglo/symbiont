storage_guardian:
  enabled: true

  identity:
    project_name: ai-local
    project_root: ${AI_LOCAL_PROJECT_ROOT}
    service_root: ${PROJECT_ROOT}/storage_guardian

  mode:
    autonomy: autonomous
    safety_profile: conservative
    compression_profile: balanced
    placement_profile: user_local
    cleanup_profile: replace_sources_after_verify

  storage_profiles:
    default: user_local
    user_local:
      catalog_backend: sqlite_wal
      blob_backend: local_content_addressed_filesystem
      event_backend: sqlite_jsonl
      lock_backend: sqlite_file_locks
      requires_external_services: false
      root_mode: xdg
    project_local:
      catalog_backend: sqlite_wal
      blob_backend: local_content_addressed_filesystem
      event_backend: sqlite_jsonl
      lock_backend: sqlite_file_locks
      requires_external_services: false
      root_mode: project_local
    advanced_postgres:
      catalog_backend: postgres
      blob_backend: local_or_s3_compatible
      event_backend: postgres
      lock_backend: postgres_advisory_locks
      requires_external_services: true

  lifecycle:
    hot_until_days: 7
    cold_after_days: 30
    age_reference_order:
      - last_accessed_at
      - processed_at
      - modified_at
      - created_at

  placement:
    local:
      enabled: true
      archive_root: ${STORAGE_GUARDIAN_DATA_DIR}/archives/storage_guardian
      data_root: ${STORAGE_GUARDIAN_DATA_DIR}

    external_ssd:
      enabled: true
      mount_path: ${AI_STORAGE_GUARDIAN_EXTERNAL_ROOT}
      archive_root: ${AI_STORAGE_GUARDIAN_EXTERNAL_ROOT}/data/storage_guardian/archives/storage_guardian
      data_mirror_root: ${AI_STORAGE_GUARDIAN_EXTERNAL_ROOT}/data/storage_guardian
      require_mount: false
      require_writable: true
      require_min_free_ratio_against_planned_archive: 1.35

    selection:
      strategy: best_available_target
      prefer_external_ssd_when_available: true
      allow_local_when_external_missing: true
      keep_index_local: true
      mirror_manifests_to_external_when_used: true

  local_fallback:
    enabled: true
    root: ${STORAGE_GUARDIAN_DATA_DIR}/managed
    pending_external_root: ${STORAGE_GUARDIAN_DATA_DIR}/managed/pending_external
    sync_when_external_available: true
    sync_check_interval_seconds: 60
    sync_max_items_per_check: 10
    sync_max_bytes_per_check: 67108864
    keep_symlinks_after_sync: true

  scheduler:
    enabled: true
    timezone: Europe/Lisbon
    active_window:
      start: "03:00"
      end: "06:00"
    run_on_startup: false
    minimum_hours_between_cycles: 20
    maximum_cycle_runtime_minutes: 120
    lock_path: ${STORAGE_GUARDIAN_DATA_DIR}/state/storage_guardian.lock

  resources:
    protect_interactive_work: true
    protected_processes:
      - ollama
      - qdrant
      - docker
      - python
      - uvicorn
      - whisper
      - faster-whisper
    cpu_budget_fraction_of_idle: 0.35
    memory_budget_fraction_of_available: 0.25
    io_budget_fraction_of_idle: 0.30
    disk_free_safety_ratio: 0.12
    pressure_check_interval_seconds: 15

  safety:
    destructive_actions_enabled: true
    delete_original_sources: true
    delete_managed_duplicates_only: false
    require_archive_verify_before_cleanup: true
    require_manifest_before_archive_visible: true
    require_filelist_before_archive_visible: true
    require_restore_test_for_new_policy: true
    restore_root: ${STORAGE_GUARDIAN_DATA_DIR}/restore
    never_restore_over_existing_path: true
    never_touch_live_storage: true
    never_touch_unregistered_paths: true
    allow_lossy_transforms: false

  index:
    catalog_backend: sqlite_wal
    catalog_path: ${STORAGE_GUARDIAN_STATE_DIR}/catalog.sqlite
    audit_path: ${STORAGE_GUARDIAN_STATE_DIR}/audit.sqlite
    operation_ledger_path: ${STORAGE_GUARDIAN_STATE_DIR}/operation_ledger.sqlite
    parquet_catalog_path: ${STORAGE_GUARDIAN_DATA_DIR}/archive_catalog.parquet
    event_log_path: ${STORAGE_GUARDIAN_STATE_DIR}/custody_events.jsonl

  manifests:
    local_manifest_root: ${STORAGE_GUARDIAN_DATA_DIR}/manifests
    local_summary_root: ${STORAGE_GUARDIAN_DATA_DIR}/summaries
    local_filelist_root: ${STORAGE_GUARDIAN_DATA_DIR}/filelists
    local_verify_root: ${STORAGE_GUARDIAN_DATA_DIR}/verify
    include_relative_paths: true
    include_hashes: true
    include_file_metadata: true
    include_restore_plan: true
    include_policy_snapshot: true
    include_storage_target: true

  storage_schema:
    version: 2
    immutable: true
    schema_hash: sha256:9aa9d0e863261e47bfaf54cdf547c753edc4d852fd5ec1b787fc270a82741027
    strict_store_coverage: true
    fallback_store_layout: pending_external/services/{service}/stores/{store}
    directory_schema: fixed_v2
    directory_modes:
      managed: storage_guardian_write_only
      scratch: service_session_writable
      cache: disposable
      state: storage_guardian_catalogued
      output: storage_guardian_materialized
      archive: verified_before_cleanup
    zones:
      - ingest
      - validation
      - approved
      - quarantine
    expected_directories:
      storage_guardian:
        - objects
        - versions
        - directories
        - manifests
        - archives
        - materialized
        - uploads
        - quarantine
        - restore
        - scratch
        - service_stores
        - indexes
      state:
        - catalog.sqlite
        - audit.sqlite
        - operation_ledger.sqlite
        - custody_events.jsonl
        - metrics
        - logs
      cache:
        - temp
        - staging
        - extraction_cache
        - upload_chunks
    materialization_roots:
      - ${AI_LOCAL_PROJECT_ROOT}
      - /workspace/ai-local
      - /host_home
    scratch_roots:
      - ${STORAGE_GUARDIAN_DATA_DIR}/scratch
      - ${AI_LOCAL_PROJECT_SCRATCH_ROOT}
    cache_roots:
      - ${STORAGE_GUARDIAN_CACHE_DIR}
    protected_paths:
      - ${STORAGE_GUARDIAN_STATE_DIR}/catalog.sqlite
      - ${STORAGE_GUARDIAN_STATE_DIR}/audit.sqlite
      - ${STORAGE_GUARDIAN_STATE_DIR}/operation_ledger.sqlite
      - ${QDRANT_DATA_DIR}
    forbidden_paths:
      - /
      - /etc
      - /usr
      - /var/lib
      - ${AI_LOCAL_PROJECT_ROOT}/.git
    operation_permissions:
      create_directory: dry_run_required
      create_file: storage_guardian_only
      create_object: idempotency_required
      copy_object: idempotency_required
      move_object: idempotency_required
      rename_object: idempotency_required
      soft_delete: default_delete
      hard_purge: policy_required
      materialize: no_silent_overwrite
    services:
      storage_guardian:
        owner: storage
        roots:
          state:
            role: control_metadata
            env_key: STORAGE_GUARDIAN_DATA_DIR
            relative_path: data/storage_guardian
          local_archives:
            role: local_archive_buffer
            relative_path: data/storage_guardian/archives/storage_guardian
          external_archives:
            role: external_archives
            relative_path: data/storage_guardian/archives/storage_guardian
          local_fallback:
            role: local_pending_external_buffer
            relative_path: data/storage_guardian/managed

      symbiont:
        owner: symbiont
        roots:
          state:
            role: agentic_runtime_state
            env_key: SYMBIONT_DATA_DIR
            relative_path: data/symbiont
        stores:
          agent_outputs:
            role: agent_outputs
            mode: managed
            policy: mixed_policy
            placement: inherit

      extrator:
        owner: features
        roots:
          state:
            role: jobs_and_manifests
            env_key: EXTRATOR_DATA_DIR
            relative_path: data/extrator
        stores:
          extrator_uploads:
            role: uploads
            mode: managed
            policy: documents_policy
            placement: inherit
          extrator_bronze:
            role: bronze_documents
            mode: managed
            policy: documents_policy
            placement: inherit
          extrator_silver:
            role: silver_documents
            mode: managed
            policy: processed_policy
            placement: inherit
          extrator_gold:
            role: gold_documents
            mode: managed
            policy: processed_policy
            placement: inherit

      rag:
        owner: rag
        roots:
          data:
            role: rag_indexes
            env_key: RAG_DATA_DIR
            relative_path: data/rag
        stores:
          rag_data:
            role: rag_data
            mode: managed
            policy: rag_chunks_policy
            placement: inherit

      qdrant:
        owner: rag
        roots:
          live_storage:
            role: vector_database_live_storage
            env_key: QDRANT_DATA_DIR
            relative_path: data/docker-volumes/qdrant
        stores:
          qdrant_snapshots:
            role: snapshots
            mode: snapshot_only
            policy: qdrant_snapshot_policy
            placement: external_ssd_preferred

      graphify:
        owner: rag
        roots:
          exports:
            role: graph_exports
            env_key: GRAPHIFY_OUT_DIR
            relative_path: data/graphify
        stores:
          graph_exports:
            role: graph_exports
            mode: managed
            policy: graph_policy
            placement: inherit

      audio_transcribe:
        owner: audio
        roots:
          data:
            role: audio_jobs_and_outputs
            env_key: AUDIO_TRANSCRIBE_DATA_DIR
            relative_path: data/audio
        stores:
          audio_outputs:
            role: transcriptions_and_exports
            mode: managed
            policy: audio_policy
            placement: external_ssd_preferred

      llm:
        owner: llm
        roots:
          gguf_models:
            role: local_model_cache
            env_key: LLM_MODELS_DIR
            relative_path: data/models/gguf
          ollama_models:
            role: ollama_model_cache
            env_key: OLLAMA_MODELS
            relative_path: data/models/ollama
          huggingface_cache:
            role: huggingface_cache
            env_key: HF_CACHE_DIR
            relative_path: data/cache/hf
        stores:
          llm_models:
            role: gguf_models
            mode: catalog_only
            policy: model_policy
            placement: external_ssd_preferred
          ollama_models:
            role: ollama_models
            mode: catalog_only
            policy: model_policy
            placement: external_ssd_preferred
          huggingface_cache:
            role: hf_cache
            mode: catalog_only
            policy: model_policy
            placement: external_ssd_preferred

      translation:
        owner: features
        roots:
          cache:
            role: translation_cache
            env_key: TRANSLATION_CACHE_DIR
            relative_path: data/cache/translation
          models:
            role: translation_models
            env_key: TRANSLATION_MODELS_DIR
            relative_path: data/models/translation

      personal_context:
        owner: features
        roots:
          data:
            role: personal_context_state
            env_key: PERSONAL_CONTEXT_DATA_DIR
            relative_path: data/personal_context

      observability:
        owner: observability
        roots:
          clickhouse_data:
            role: clickhouse_data
            env_key: CLICKHOUSE_DATA_DIR
            relative_path: data/docker-volumes/clickhouse/data
          clickhouse_logs:
            role: clickhouse_logs
            env_key: CLICKHOUSE_LOGS_DIR
            relative_path: logs/clickhouse
          grafana:
            role: grafana_state
            env_key: GRAFANA_DATA_DIR
            relative_path: data/docker-volumes/grafana
          langfuse_db:
            role: langfuse_database_state
            env_key: LANGFUSE_DB_DATA_DIR
            relative_path: data/docker-volumes/langfuse-db

      redis:
        owner: audio
        roots:
          data:
            role: redis_ephemeral_state
            env_key: REDIS_DATA_DIR
            relative_path: data/docker-volumes/redis

      system:
        owner: system
        roots:
          logs:
            role: operator_logs
            env_key: AI_LOCAL_LOGS_ROOT
            relative_path: logs
          tmp:
            role: temporary_outputs
            env_key: AI_LOCAL_PROJECT_SCRATCH_ROOT
            relative_path: data/storage_guardian/scratch/project
        stores:
          logs:
            role: logs
            mode: managed
            policy: text_like_policy
            placement: inherit
          temp_outputs:
            role: temporary_outputs
            mode: managed
            policy: temporary_policy
            placement: local_only

  storage_control:
    enabled: true
    require_known_agent: true
    default_zone: ingest
    durability_mode: fast
    max_inline_bytes: 262144
    max_object_text_read_bytes: 262144
    idempotency_ttl_seconds: 86400
    max_upload_ttl_seconds: 86400
    hard_purge_enabled: false
    materialize_allowed_roots:
      - ${AI_LOCAL_PROJECT_ROOT}
      - /workspace/ai-local
      - /host_home
    quarantine_root: ${STORAGE_GUARDIAN_DATA_DIR}/control/quarantine
    zones:
      - ingest
      - validation
      - approved
      - quarantine
    owners:
      extrator:
        default_store: extrator_uploads
        allowed_stores:
          - extrator_uploads
          - extrator_bronze
          - extrator_silver
          - extrator_gold
          - agent_outputs
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - materialize
          - read_metadata
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 40
        ttl: P90D

      rag:
        default_store: rag_data
        allowed_stores:
          - rag_data
          - agent_outputs
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - materialize
          - read_metadata
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 50
        ttl: P180D

      graphify:
        default_store: graph_exports
        allowed_stores:
          - graph_exports
          - agent_outputs
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - read_metadata
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 20
        ttl: P180D

      audio_transcribe:
        default_store: audio_outputs
        allowed_stores:
          - audio_outputs
          - agent_outputs
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - read_metadata
          - read_text
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 100
        ttl: P365D

      symbiont:
        default_store: agent_outputs
        allowed_stores:
          - agent_outputs
          - temp_outputs
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - materialize
          - read_metadata
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 30
        ttl: P90D

      system:
        default_store: logs
        allowed_stores:
          - logs
          - temp_outputs
          - qdrant_snapshots
        allowed_actions:
          - create
          - create_directory
          - upload
          - commit
          - copy_object
          - move_object
          - rename_object
          - read_metadata
          - delete
          - promote
        allowed_zones:
          - ingest
          - validation
          - approved
          - quarantine
        quota_gb: 20
        ttl: P30D

  relocation:
    enabled: true
    target_root: ${AI_STORAGE_EXTERNAL_ROOT}/relocated/ai-local
    default_replace_with: symlink
    protected_paths:
      - .git
      - .agents
      - .codex
      - config
      - storage_guardian/src
    recommended_paths:
      - .uv-cache
      - obsidian-rag/.mypy_cache

  stores:
    - name: logs
      enabled: true
      path: ${AI_LOCAL_LOGS_ROOT}/project
      owner: system
      type: logs
      mode: managed
      policy: text_like_policy
      placement: inherit

    - name: extrator_uploads
      enabled: true
      path: ${EXTRATOR_DATA_DIR}/uploads
      owner: extrator
      type: documents
      mode: managed
      policy: documents_policy
      placement: inherit

    - name: extrator_bronze
      enabled: true
      path: ${EXTRATOR_DATA_DIR}/bronze
      owner: extrator
      type: documents
      mode: managed
      policy: documents_policy
      placement: inherit

    - name: extrator_silver
      enabled: true
      path: ${EXTRATOR_DATA_DIR}/silver
      owner: extrator
      type: processed_documents
      mode: managed
      policy: processed_policy
      placement: inherit

    - name: extrator_gold
      enabled: true
      path: ${EXTRATOR_DATA_DIR}/gold
      owner: extrator
      type: processed_documents
      mode: managed
      policy: processed_policy
      placement: inherit

    - name: rag_data
      enabled: true
      path: ${RAG_DATA_DIR}
      owner: rag
      type: rag_data
      mode: managed
      policy: rag_chunks_policy
      placement: inherit

    - name: qdrant_snapshots
      enabled: true
      path: ${QDRANT_DATA_DIR}/snapshots
      owner: qdrant
      type: qdrant_snapshots
      mode: snapshot_only
      policy: qdrant_snapshot_policy
      placement: external_ssd_preferred

    - name: graph_exports
      enabled: true
      path: ${GRAPHIFY_OUT_DIR}
      owner: graph
      type: graph_exports
      mode: managed
      policy: graph_policy
      placement: inherit

    - name: audio_outputs
      enabled: true
      path: ${AUDIO_TRANSCRIBE_DATA_DIR}/output
      owner: audio_transcribe
      type: audio
      mode: managed
      policy: audio_policy
      placement: external_ssd_preferred

    - name: agent_outputs
      enabled: true
      path: ${SYMBIONT_DATA_DIR}/agent_outputs
      owner: agents
      type: mixed_outputs
      mode: managed
      policy: mixed_policy
      placement: inherit

    - name: temp_outputs
      enabled: true
      path: ${AI_LOCAL_PROJECT_SCRATCH_ROOT}
      owner: system
      type: temporary
      mode: managed
      policy: temporary_policy
      placement: local_only

    - name: llm_models
      enabled: true
      path: ${LLM_MODELS_DIR}
      owner: llm
      type: models
      mode: catalog_only
      policy: model_policy
      placement: external_ssd_preferred

    - name: ollama_models
      enabled: true
      path: ${OLLAMA_MODELS}
      owner: llm
      type: models
      mode: catalog_only
      policy: model_policy
      placement: external_ssd_preferred

    - name: huggingface_cache
      enabled: true
      path: ${HF_CACHE_DIR}
      owner: llm
      type: cache
      mode: catalog_only
      policy: model_policy
      placement: external_ssd_preferred

  policies:
    text_like_policy:
      extensions:
        - .txt
        - .md
        - .markdown
        - .json
        - .jsonl
        - .csv
        - .html
        - .htm
        - .xml
        - .log
        - .eml
        - .sql
        - .py
        - .js
        - .ts
        - .yaml
        - .yml
        - .toml
        - .sh
      warm_backend: zstd
      cold_backend: sevenzip
      recompress_individual_files: true
      compression_gain_test: false
      summary_enabled: true

    documents_policy:
      extensions:
        - .pdf
        - .doc
        - .docx
        - .xls
        - .xlsx
        - .ppt
        - .pptx
        - .odt
        - .ods
        - .odp
        - .pbix
        - .pbit
        - .md
        - .markdown
        - .txt
        - .html
        - .htm
        - .xml
        - .csv
        - .tsv
        - .json
        - .jsonl
        - .ndjson
        - .gz
        - .sql
        - .py
        - .js
        - .ts
        - .tsx
        - .jsx
        - .java
        - .go
        - .rs
        - .c
        - .cpp
        - .h
        - .hpp
        - .cs
        - .sh
        - .yaml
        - .yml
        - .toml
        - .ini
        - .png
        - .jpg
        - .jpeg
        - .webp
        - .tif
        - .tiff
      warm_backend: zstd
      cold_backend: sevenzip
      recompress_individual_files: false
      compression_gain_test: true
      opaque_extensions:
        - .pbix
        - .pbit
      summary_enabled: true

    processed_policy:
      inherit_from: text_like_policy
      extensions:
        - .txt
        - .md
        - .json
        - .jsonl
        - .csv
        - .html
        - .xml
        - .log
        - .eml
        - .sql
        - .py
        - .js
        - .ts
        - .yaml
        - .yml
        - .toml
        - .sh
        - .parquet
      summary_enabled: true

    rag_chunks_policy:
      extensions:
        - .json
        - .jsonl
        - .parquet
        - .md
        - .txt
      warm_backend: zstd
      cold_backend: zstd
      respect_internal_compression:
        - .parquet
      compression_gain_test: true
      summary_enabled: true

    qdrant_snapshot_policy:
      allowed_input_kind: snapshot
      forbidden_input_kind: live_storage
      warm_backend: zstd
      cold_backend: sevenzip
      compression_gain_test: true
      summary_enabled: true

    graph_policy:
      extensions:
        - .json
        - .jsonl
        - .graphml
        - .gexf
        - .parquet
        - .csv
        - .md
      warm_backend: zstd
      cold_backend: sevenzip
      compression_gain_test: true
      summary_enabled: true

    audio_policy:
      wav_transform: flac_lossless
      aiff_transform: flac_lossless
      mp3_transform: archive_only
      m4a_transform: archive_only
      opus_transform: archive_only
      transcript_backend: zstd
      cold_backend: sevenzip
      summary_enabled: true

    mixed_policy:
      warm_backend: zstd
      cold_backend: sevenzip
      compression_gain_test: true
      summary_enabled: true

    temporary_policy:
      warm_backend: zstd
      cold_backend: sevenzip
      compression_gain_test: false
      summary_enabled: false
      destructive_cleanup_allowed: false

    model_policy:
      warm_backend: passthrough
      cold_backend: passthrough
      compression_gain_test: false
      summary_enabled: true

  api:
    bind_host: 127.0.0.1
    port: 8730
    require_internal_token: true
    token_env_var: STORAGE_GUARDIAN_INTERNAL_TOKEN

  observability:
    structured_logs: true
    metrics_enabled: true
    metrics_path: ${STORAGE_GUARDIAN_DATA_DIR}/state/metrics.jsonl
    record_effective_config_per_cycle: true
    record_resource_pressure: true
    record_archive_decisions: true
    record_skipped_files: true
