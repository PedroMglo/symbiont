# ai-local Docker service policy catalog.
#
# This file is the intended policy. The observed runtime graph is generated from
# `docker compose config --format json` by scripts/docker_policy.py.

[defaults]
bind_required = "127.0.0.1"
review_after = "2026-07-01"

[generated_env_files]
storage = ".env.storage.generated"
llm = ".env.llm.generated"
services = ".env.services.generated"
observability = "infra/docker/.env.observability"

[storage_guardian]
exclusive_write_paths = [".local/data/storage_guardian"]
exclusive_write_volumes = []

[services.storage_guardian]
class = "admin-local"
owner = "storage"
risk = "medium"
reason = "Local storage lifecycle API for operator and symbiont control."
review_after = "2026-07-01"
profiles_expected = ["storage"]
generated_env = ["storage", "services"]
secrets_required = ["storage_guardian_internal_api_key"]
secret_profile = "internal"
resource_profile = "small"
host_ports_allowed = [8730]
bind_required = "127.0.0.1"
compose_healthcheck_required = true
host_home_access = "storage_write"
host_home_access_reason = "Storage Guardian is the sole storage owner allowed to materialize user-requested outputs on the user's machine."
stateful = true
backup_required = true
restore_test_required = true

[services.symbiont]
class = "gateway-public"
owner = "symbiont"
risk = "medium"
reason = "Primary local API gateway and agentic runtime entrypoint."
review_after = "2026-07-01"
profiles_expected = ["core"]
generated_env = ["storage", "llm", "services"]
secrets_required = ["orc_api_key", "ollama_api_key", "rag_api_key", "qdrant_api_key", "internal_api_key", "audio_transcribe_api_key"]
secret_profile = "gateway"
resource_profile = "medium"
host_ports_allowed = [8586]
bind_required = "127.0.0.1"
compose_healthcheck_required = true
host_home_access = "read_only"
host_home_access_reason = "Gateway needs read-only access to user-requested local paths for evidence acquisition; writes remain delegated to storage_guardian."
stateful = true
backup_required = true
restore_test_required = true

