# Obsidian RAG — Configuração do Utilizador
# Edita este ficheiro para personalizar o teu setup.
# Todas as opções aqui sobrepõem os defaults em internal.toml.
# Env vars com prefixo RAG_ sobrepõem ambos os ficheiros.
# Ex: RAG_RETRIEVAL_TOP_K=15 sobrepõe [retrieval] top_k

[paths]
# Configure personal Markdown/Obsidian sources here after first install.
# Example: vault_dirs = ["~/Obsidian/Vault"]
vault_dirs = []

[sync]
backend = "direct"

[retrieval]
# Retrieval top_k is inferred by rag_config.
context_mode = "auto"
token_budget = 6000

[api]
# API key para autenticação (vazio = sem autenticação)
# Query/rate budgets are inferred by rag_config.

# All model selections and rag_capable toggles are centralized in models.json

[router]
enabled = true
# model loaded from models.json

[reranker]
enabled = true
# model loaded from models.json

[debug]
enabled = false
log_level = "INFO"
log_format = "text"

[workflows]
# Default runtime uses Temporal. Use backend = "direct" only for isolated local debugging.
backend = "temporal"

[repos]
# Configure local repositories here after first install.
# Example: paths = ["~/_projects"]
paths = []

[graphify]
enabled = false
backend = "ollama"
# model loaded from models.json
graph_vault_dir = "data/graphify-vault"
auto_update = true
extract_mode = "deep"     # aggressive INFERRED-edge semantic extraction (adds descriptions)
# Runtime query backend. Keep "json" unless the optional FalkorDB profile is
# running and obsidian-rag is installed with the falkordb extra.
query_backend = "json"
# For Docker profile rag-graph use falkor_host = "rag-falkordb".
falkor_host = "localhost"
falkor_port = 6379
falkor_graph = "obsidian_rag"

[observability]
enabled = true
clickhouse_database = "obsidian_rag"
clickhouse_username = "default"
resource_sampling = true
